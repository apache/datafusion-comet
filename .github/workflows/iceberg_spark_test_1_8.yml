# Runs on main only. Oldest supported Iceberg version, paired with Spark 3.4.
name: Iceberg Spark SQL Tests (Iceberg 1.8)

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - "native/**/src/**"
      - "native/**/Cargo.toml"
      - "native/Cargo.lock"
      - "!native/hdfs/**"
      - "!native/fs-hdfs/**"
      - "common/src/main/**"
      - "common/pom.xml"
      - "spark/src/main/**"
      - "!spark/src/main/scala/org/apache/comet/GenerateDocs.scala"
      - "spark/pom.xml"
      - "dev/diffs/iceberg/**"
      - "pom.xml"
      - "rust-toolchain.toml"
      - ".github/workflows/iceberg_spark_test_1_8.yml"
      - ".github/workflows/iceberg_spark_test_reusable.yml"
      - ".github/actions/setup-builder/**"
      - ".github/actions/setup-iceberg-builder/**"
  workflow_dispatch:

jobs:
  iceberg-spark:
    uses: ./.github/workflows/iceberg_spark_test_reusable.yml
    with:
      iceberg-short: '1.8'
      iceberg-full: '1.8.1'
      spark-short: '3.4'
      spark-full: '3.4.3'
      java: 11
