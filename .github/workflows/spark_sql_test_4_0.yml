# Runs on every PR and on main. Spark 4.0 is the newest stable Spark line.
name: Spark SQL Tests (Spark 4.0)

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - "native/**/src/**"
      - "native/**/Cargo.toml"
      - "native/Cargo.lock"
      - "!native/hdfs/**"
      - "!native/fs-hdfs/**"
      - "common/src/main/**"
      - "common/pom.xml"
      - "spark/src/main/**"
      - "!spark/src/main/scala/org/apache/comet/GenerateDocs.scala"
      - "spark/pom.xml"
      - "dev/diffs/**"
      - "pom.xml"
      - "rust-toolchain.toml"
      - ".github/workflows/spark_sql_test_4_0.yml"
      - ".github/workflows/spark_sql_test_reusable.yml"
      - ".github/actions/setup-builder/**"
      - ".github/actions/setup-spark-builder/**"
  pull_request:
    paths:
      - "native/**/src/**"
      - "native/**/Cargo.toml"
      - "native/Cargo.lock"
      - "!native/hdfs/**"
      - "!native/fs-hdfs/**"
      - "common/src/main/**"
      - "common/pom.xml"
      - "spark/src/main/**"
      - "!spark/src/main/scala/org/apache/comet/GenerateDocs.scala"
      - "spark/pom.xml"
      - "dev/diffs/**"
      - "pom.xml"
      - "rust-toolchain.toml"
      - ".github/workflows/spark_sql_test_4_0.yml"
      - ".github/workflows/spark_sql_test_reusable.yml"
      - ".github/actions/setup-builder/**"
      - ".github/actions/setup-spark-builder/**"
  workflow_dispatch:
    inputs:
      collect-fallback-logs:
        description: 'Whether to collect Comet fallback reasons from spark sql unit test logs'
        required: false
        default: false
        type: boolean

jobs:
  spark-sql:
    uses: ./.github/workflows/spark_sql_test_reusable.yml
    with:
      spark-short: '4.0'
      spark-full: '4.0.2'
      java: 21
      collect-fallback-logs: ${{ github.event.inputs.collect-fallback-logs == 'true' }}
