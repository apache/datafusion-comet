# Upstream-side status poller.
#
# notify_test_workflow.yml creates a "Build" check on each PR with the
# fork's owner/repo/run_id embedded in the check output's text field. This
# scheduled workflow walks open PRs every 15 minutes, fetches each fork
# run, and PATCHes the upstream check with the fork run's current status
# and (if completed) conclusion.
#
# This produces at most a 15-minute lag between fork CI completion and
# the upstream check flipping green / red. If sharper latency is needed,
# add a `check_suite: completed` trigger in addition to the cron.

name: Update build status workflow

on:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  update:
    name: Update build status
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      checks: write
    steps:
      - name: "Update build status"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const endpoint = 'GET /repos/:owner/:repo/pulls?state=:state'
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            }

            // See https://docs.github.com/en/graphql/reference/enums#mergestatestatus
            const maybeReady = ['behind', 'clean', 'draft', 'has_hooks', 'unknown', 'unstable'];

            for await (const prs of github.paginate.iterator(endpoint, params)) {
              for await (const pr of prs.data) {
                console.log('SHA: ' + pr.head.sha)
                console.log('  Mergeable status: ' + pr.mergeable_state)
                if (pr.mergeable_state == null || maybeReady.includes(pr.mergeable_state)) {
                  const checkRuns = await github.request('GET /repos/{owner}/{repo}/commits/{ref}/check-runs', {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: pr.head.sha
                  })

                  for await (const cr of checkRuns.data.check_runs) {
                    if (cr.name == 'Build' && cr.conclusion != "action_required") {
                      const params = JSON.parse(cr.output.text)

                      let run
                      try {
                        run = await github.request('GET /repos/{owner}/{repo}/actions/runs/{run_id}', params)
                      } catch (error) {
                        console.error(error)
                        // Contributor may have deleted the run or disabled
                        // Actions on the fork after the check was created.
                        continue
                      }

                      if (run.data.status == 'completed') {
                        console.log('    Run ' + cr.id + ': set status (' + run.data.status + ') and conclusion (' + run.data.conclusion + ')')
                        await github.request('PATCH /repos/{owner}/{repo}/check-runs/{check_run_id}', {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          check_run_id: cr.id,
                          output: cr.output,
                          status: run.data.status,
                          conclusion: run.data.conclusion,
                          details_url: run.data.details_url
                        })
                      } else {
                        console.log('    Run ' + cr.id + ': set status (' + run.data.status + ')')
                        await github.request('PATCH /repos/{owner}/{repo}/check-runs/{check_run_id}', {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          check_run_id: cr.id,
                          output: cr.output,
                          status: run.data.status,
                          details_url: run.data.details_url
                        })
                      }

                      break
                    }
                  }
                }
              }
            }
