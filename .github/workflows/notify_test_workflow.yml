# Upstream-side PR notifier.
#
# Triggered by pull_request_target on the upstream apache/datafusion-comet
# repo; runs with the upstream GITHUB_TOKEN (write access to checks). Looks
# up the corresponding run of build_main.yml on the PR author's fork, then
# creates a "Build" check run on the PR commit that points to the fork's
# workflow. A scheduled companion workflow (update_build_status.yml)
# later PATCHes this check with the fork run's final status and conclusion.
#
# The workflow name is intentionally generic — GitHub's check-suite logic
# associates check runs with an arbitrary workflow in the repo.
#
# COUPLING — these strings must stay in sync with build_main.yml /
# build_and_test.yml:
#   - `id: 'build_main.yml'` below: the lookup uses the workflow's filename.
#     If build_main.yml is ever renamed, update this id too.
#   - `r.name === "Run / Check changes"` filter further down: "Run" is the
#     display name of build_main.yml's `call-build-and-test` job;
#     "Check changes" is the display name of build_and_test.yml's
#     `precondition` job.
#
# SECURITY: pull_request_target runs with repo secrets. This script never
# checks out or executes fork code — it only makes GitHub API calls.

name: On pull request update

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  notify:
    name: Notify test workflow
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      checks: write
    steps:
      - name: "Notify test workflow"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const endpoint = 'GET /repos/:owner/:repo/actions/workflows/:id/runs?&branch=:branch'
            const check_run_endpoint = 'GET /repos/:owner/:repo/commits/:ref/check-runs'

            const params = {
              owner: context.payload.pull_request.head.repo.owner.login,
              repo: context.payload.pull_request.head.repo.name,
              id: 'build_main.yml',
              branch: context.payload.pull_request.head.ref,
            }
            const check_run_params = {
              owner: context.payload.pull_request.head.repo.owner.login,
              repo: context.payload.pull_request.head.repo.name,
              ref: context.payload.pull_request.head.ref,
            }

            console.log('Ref: ' + context.payload.pull_request.head.ref)
            console.log('SHA: ' + context.payload.pull_request.head.sha)

            // Give the fork push event a moment to start its workflow run.
            await new Promise(r => setTimeout(r, 3000))

            let runs
            try {
              runs = await github.request(endpoint, params)
            } catch (error) {
              console.error(error)
            }

            const name = 'Build'
            const head_sha = context.payload.pull_request.head.sha
            let status = 'queued'

            if (!runs || runs.data.workflow_runs.length === 0) {
              status = 'completed'
              const conclusion = 'action_required'

              github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: name,
                head_sha: head_sha,
                status: status,
                conclusion: conclusion,
                output: {
                  title: 'Workflow run detection failed',
                  summary: `
            Unable to detect the Build workflow run for your PR on your fork.

            1. If you have not enabled GitHub Actions on your fork, enable it
               from the *Actions* tab of your fork. See
               [Disabling or limiting GitHub Actions for a repository](https://docs.github.com/en/github/administering-a-repository/disabling-or-limiting-github-actions-for-a-repository).
            2. Your branch may be out of date relative to \`apache/datafusion-comet:main\`.
               Rebase and force-push:
               \`\`\`bash
               git fetch upstream
               git rebase upstream/main
               git push origin YOUR_BRANCH --force
               \`\`\`
            `,
                }
              })
            } else {
              const run_id = runs.data.workflow_runs[0].id

              if (runs.data.workflow_runs[0].head_sha != context.payload.pull_request.head.sha) {
                throw new Error('There was a new unsynced commit pushed. Please retrigger the workflow.');
              }

              // Prefer the granular precondition check so users click into
              // a meaningful sub-view rather than the top-level actions page.
              // The "Run / Check changes" name comes from build_main.yml's
              // `call-build-and-test` job (display name "Run") calling
              // build_and_test.yml's `precondition` job (display name
              // "Check changes") — keep these strings in sync.
              const check_runs = await github.request(check_run_endpoint, check_run_params)
              const check_run_head = check_runs.data.check_runs.filter(r => r.name === "Run / Check changes")[0]

              if (check_run_head && check_run_head.head_sha != context.payload.pull_request.head.sha) {
                throw new Error('There was a new unsynced commit pushed. Please retrigger the workflow.');
              }

              const check_run_url = check_run_head
                ? 'https://github.com/'
                    + context.payload.pull_request.head.repo.full_name
                    + '/runs/'
                    + check_run_head.id
                : 'https://github.com/'
                    + context.payload.pull_request.head.repo.full_name
                    + '/actions/runs/'
                    + run_id

              const actions_url = 'https://github.com/'
                + context.payload.pull_request.head.repo.full_name
                + '/actions/runs/'
                + run_id

              github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: name,
                head_sha: head_sha,
                status: status,
                output: {
                  title: 'Test results',
                  summary: '[See test results](' + check_run_url + ')',
                  // update_build_status.yml reads owner/repo/run_id from here
                  // to poll the fork's run. Keep the shape stable.
                  text: JSON.stringify({
                    owner: context.payload.pull_request.head.repo.owner.login,
                    repo: context.payload.pull_request.head.repo.name,
                    run_id: run_id
                  })
                },
                details_url: actions_url,
              })
            }
