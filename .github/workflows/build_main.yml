# Fork-side entry workflow.
#
# This fires on every branch push in a contributor's fork and consumes the
# fork's GitHub Actions minutes. The upstream apache/datafusion-comet repo
# detects the run via notify_test_workflow.yml and surfaces its status as a
# "Build" check on the PR. The name is intentionally generic to match
# Spark's convention ("Build") — GitHub's check-suite-from-workflow mapping
# picks an arbitrary associated workflow when creating a check run.
#
# See also: https://github.community/t/specify-check-suite-when-creating-a-checkrun/118380/10

name: Build

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - "benchmarks/**"
      - "doc/**"
      - "docs/**"
      - "**.md"
      - "dev/changelog/*.md"

jobs:
  run:
    name: Run
    permissions:
      packages: write
    uses: ./.github/workflows/pr_build_entry.yml
