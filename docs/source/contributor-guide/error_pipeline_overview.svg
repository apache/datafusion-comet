<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="monospace, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="900" height="760" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#cdd6f4" font-size="18" font-weight="bold">Comet: ANSI SQL Error Propagation Pipeline</text>

  <!-- === LAYER: SPARK / JVM === -->
  <rect x="20" y="55" width="860" height="200" rx="8" fill="#181825" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="74" fill="#89b4fa" font-size="12" font-weight="bold">SPARK / JVM LAYER</text>

  <!-- Box: User SQL -->
  <rect x="40" y="82" width="160" height="50" rx="6" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="120" y="103" text-anchor="middle" fill="#cba6f7" font-weight="bold">User SQL Query</text>
  <text x="120" y="120" text-anchor="middle" fill="#a6e3a1" font-size="11">SELECT a/b FROM t</text>

  <!-- Arrow: SQL → SerPlan -->
  <line x1="201" y1="107" x2="255" y2="107" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="228" y="100" text-anchor="middle" fill="#6c7086" font-size="10">serialize</text>

  <!-- Box: QueryPlanSerde -->
  <rect x="256" y="82" width="180" height="50" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="346" y="103" text-anchor="middle" fill="#89b4fa" font-weight="bold">QueryPlanSerde.scala</text>
  <text x="346" y="120" text-anchor="middle" fill="#a6e3a1" font-size="11">extracts origin → QueryContext</text>

  <!-- Arrow: SerPlan → Proto -->
  <line x1="437" y1="107" x2="491" y2="107" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="464" y="100" text-anchor="middle" fill="#6c7086" font-size="10">protobuf</text>

  <!-- Box: Protobuf bytes -->
  <rect x="492" y="82" width="160" height="50" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="572" y="103" text-anchor="middle" fill="#f38ba8" font-weight="bold">Protobuf Bytes</text>
  <text x="572" y="120" text-anchor="middle" fill="#a6e3a1" font-size="11">Expr + expr_id + QueryContext</text>

  <!-- Arrow: Proto → JNI -->
  <line x1="653" y1="107" x2="707" y2="107" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="680" y="100" text-anchor="middle" fill="#6c7086" font-size="10">JNI call</text>

  <!-- Box: createPlan -->
  <rect x="708" y="82" width="145" height="50" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="780" y="103" text-anchor="middle" fill="#89b4fa" font-weight="bold">Native.createPlan()</text>
  <text x="780" y="120" text-anchor="middle" fill="#a6e3a1" font-size="11">JNI entry point</text>

  <!-- === STEP 7 & 8: CometExecIterator + SparkErrorConverter === -->
  <!-- Arrow from SparkErrorConverter back up to Exception -->
  <rect x="40" y="152" width="200" height="50" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="140" y="172" text-anchor="middle" fill="#a6e3a1" font-weight="bold">CometExecIterator</text>
  <text x="140" y="188" text-anchor="middle" fill="#cdd6f4" font-size="11">catches CometQueryExecutionException</text>

  <rect x="265" y="152" width="200" height="50" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="365" y="172" text-anchor="middle" fill="#a6e3a1" font-weight="bold">SparkErrorConverter</text>
  <text x="365" y="188" text-anchor="middle" fill="#cdd6f4" font-size="11">parses JSON → Spark exception</text>

  <rect x="490" y="152" width="200" height="50" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="590" y="172" text-anchor="middle" fill="#a6e3a1" font-weight="bold">ShimSparkErrorConverter</text>
  <text x="590" y="188" text-anchor="middle" fill="#cdd6f4" font-size="11">calls QueryExecutionErrors.*</text>

  <rect x="715" y="152" width="155" height="50" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="792" y="172" text-anchor="middle" fill="#f38ba8" font-weight="bold">ArithmeticException</text>
  <text x="792" y="188" text-anchor="middle" fill="#cdd6f4" font-size="11">[DIVIDE_BY_ZERO] + SQL ptr</text>

  <!-- Arrows in return path -->
  <line x1="240" y1="177" x2="263" y2="177" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrowheadGreen)"/>
  <line x1="465" y1="177" x2="488" y2="177" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrowheadGreen)"/>
  <line x1="690" y1="177" x2="713" y2="177" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrowheadGreen)"/>

  <!-- === JNI BOUNDARY === -->
  <rect x="20" y="265" width="860" height="22" rx="4" fill="#181825" stroke="#f38ba8" stroke-width="2"/>
  <text x="450" y="281" text-anchor="middle" fill="#f38ba8" font-size="12" font-weight="bold">──────────────────  JNI BOUNDARY (Java ↔ Rust)  ──────────────────</text>

  <!-- Arrow: Rust error → JNI -->
  <line x1="450" y1="540" x2="450" y2="285" stroke="#f38ba8" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowheadRed)"/>
  <text x="460" y="420" fill="#f38ba8" font-size="11">throw CometQueryExecutionException</text>
  <text x="460" y="436" fill="#f38ba8" font-size="11">(JSON payload)</text>

  <!-- Arrow: createPlan → Rust planner -->
  <line x1="780" y1="132" x2="780" y2="285" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- goes down, continues below -->

  <!-- === LAYER: RUST / NATIVE === -->
  <rect x="20" y="297" width="860" height="390" rx="8" fill="#181825" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="318" fill="#f9e2af" font-size="12" font-weight="bold">RUST / NATIVE LAYER  (DataFusion)</text>

  <!-- Box: PhysicalPlanner -->
  <rect x="40" y="328" width="200" height="70" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="140" y="350" text-anchor="middle" fill="#89b4fa" font-weight="bold">PhysicalPlanner</text>
  <text x="140" y="367" text-anchor="middle" fill="#cdd6f4" font-size="11">planner.rs</text>
  <text x="140" y="384" text-anchor="middle" fill="#cdd6f4" font-size="11">deserializes proto, builds plan</text>

  <!-- Box: QueryContextMap -->
  <rect x="270" y="328" width="200" height="70" rx="6" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
  <text x="370" y="350" text-anchor="middle" fill="#fab387" font-weight="bold">QueryContextMap</text>
  <text x="370" y="367" text-anchor="middle" fill="#cdd6f4" font-size="11">query_context.rs</text>
  <text x="370" y="384" text-anchor="middle" fill="#cdd6f4" font-size="11">expr_id → QueryContext registry</text>

  <!-- Arrow: planner → register context -->
  <line x1="241" y1="363" x2="268" y2="363" stroke="#fab387" stroke-width="1.5" marker-end="url(#arrowheadOrange)"/>
  <text x="255" y="356" text-anchor="middle" fill="#fab387" font-size="10">register</text>

  <!-- Box: Native Expressions -->
  <rect x="500" y="328" width="200" height="70" rx="6" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="600" y="350" text-anchor="middle" fill="#cba6f7" font-weight="bold">Native Expressions</text>
  <text x="600" y="367" text-anchor="middle" fill="#cdd6f4" font-size="11">Cast, CheckOverflow,</text>
  <text x="600" y="384" text-anchor="middle" fill="#cdd6f4" font-size="11">CheckedBinaryExpr, ...</text>

  <!-- Arrow: planner → expressions (with context lookup) -->
  <line x1="441" y1="363" x2="498" y2="363" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#arrowheadPurple)"/>
  <text x="470" y="356" text-anchor="middle" fill="#cba6f7" font-size="10">build + attach ctx</text>

  <!-- Box: SparkError enum -->
  <rect x="40" y="430" width="200" height="70" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="140" y="452" text-anchor="middle" fill="#f38ba8" font-weight="bold">SparkError (enum)</text>
  <text x="140" y="469" text-anchor="middle" fill="#cdd6f4" font-size="11">error.rs — 30+ variants</text>
  <text x="140" y="485" text-anchor="middle" fill="#a6e3a1" font-size="11">DivideByZero, CastInvalidValue...</text>

  <!-- Box: SparkErrorWithContext -->
  <rect x="270" y="430" width="200" height="70" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="370" y="452" text-anchor="middle" fill="#f38ba8" font-weight="bold">SparkErrorWithContext</text>
  <text x="370" y="469" text-anchor="middle" fill="#cdd6f4" font-size="11">error.rs</text>
  <text x="370" y="485" text-anchor="middle" fill="#cdd6f4" font-size="11">SparkError + QueryContext</text>

  <!-- Arrow: SparkError → SparkErrorWithContext -->
  <line x1="241" y1="465" x2="268" y2="465" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrowheadRed)"/>
  <text x="255" y="458" text-anchor="middle" fill="#f38ba8" font-size="10">wrap</text>

  <!-- Arrow: expressions emit errors -->
  <line x1="600" y1="399" x2="600" y2="440" stroke="#f38ba8" stroke-width="1.5"/>
  <line x1="600" y1="440" x2="242" y2="440" stroke="#f38ba8" stroke-width="1.5"/>
  <line x1="242" y1="440" x2="242" y2="432" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrowheadRed)"/>
  <text x="500" y="455" fill="#f38ba8" font-size="10">Err(SparkError::DivideByZero)</text>

  <!-- Box: throw_exception (JNI boundary handler) -->
  <rect x="500" y="430" width="200" height="70" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="600" y="452" text-anchor="middle" fill="#f38ba8" font-weight="bold">throw_exception()</text>
  <text x="600" y="469" text-anchor="middle" fill="#cdd6f4" font-size="11">errors.rs</text>
  <text x="600" y="485" text-anchor="middle" fill="#cdd6f4" font-size="11">serializes to JSON, calls JNI</text>

  <!-- Arrow: SparkErrorWithContext → throw_exception -->
  <line x1="471" y1="465" x2="498" y2="465" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrowheadRed)"/>
  <text x="485" y="458" text-anchor="middle" fill="#f38ba8" font-size="10">.to_json()</text>

  <!-- Box: JSON payload -->
  <rect x="40" y="530" width="620" height="130" rx="6" fill="#11111b" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="50" y="552" fill="#a6e3a1" font-size="11" font-weight="bold">JSON Payload thrown to JVM:</text>
  <text x="50" y="572" fill="#cdd6f4" font-size="11">{"errorType": "DivideByZero", "errorClass": "DIVIDE_BY_ZERO", "params": {},</text>
  <text x="50" y="590" fill="#cdd6f4" font-size="11"> "context": {"sqlText": "SELECT a/b FROM t", "startIndex": 7, "stopIndex": 9,</text>
  <text x="50" y="608" fill="#cdd6f4" font-size="11">             "line": 1, "startPosition": 7},</text>
  <text x="50" y="626" fill="#cdd6f4" font-size="11"> "summary": "== SQL (line 1, position 8) ==\nSELECT a/b FROM t\n       ^^^"}</text>
  <text x="50" y="651" fill="#6c7086" font-size="10">↑ This is the getMessage() of CometQueryExecutionException on the Java side</text>

  <!-- Arrow: throw_exception → JSON -->
  <line x1="600" y1="501" x2="600" y2="528" stroke="#f38ba8" stroke-width="1.5"/>
  <line x1="600" y1="528" x2="350" y2="528" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrowheadRed)"/>

  <!-- Arrowhead definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6c7086"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a6e3a1"/>
    </marker>
    <marker id="arrowheadRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f38ba8"/>
    </marker>
    <marker id="arrowheadOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fab387"/>
    </marker>
    <marker id="arrowheadPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cba6f7"/>
    </marker>
  </defs>
</svg>