# Source of truth for Spark expression coverage and audit status in Comet.
# Phase 1: manually maintained. A future generator will consume this file.
#
# Fields:
#   name         Spark SQL function name (lowercase, as in Spark FunctionRegistry)
#   category     Spark FunctionRegistry category (agg_funcs, array_funcs, ...)
#   implemented  true if the expression has a serde registered in Comet, else false
#   audits       (optional) list of audit records, oldest first:
#     spark_versions  list of Spark version strings audited against
#     date            ISO date (YYYY-MM-DD) the audit was completed
#     findings        free-text summary (may contain Markdown)

