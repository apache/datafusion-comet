    category: array_funcs
    implemented: true
    audits:
      - spark_versions: ["3.4.3", "3.5.8", "4.0.1"]
        date: 2026-04-02
        findings: >
          No behavioral differences across Spark versions. Fixed `nullable()`
          metadata bug (did not account for `pos_expr`). Added SQL tests for
          multiple types (string, boolean, double, float, long, short, byte),
          literal arguments, null handling, negative indices, out-of-bounds
          padding, special float values (NaN, Infinity), multibyte UTF-8, and
          legacy negative index mode. Known incompatibility: pos=0 error
          message differs from Spark's `INVALID_INDEX_OF_ZERO`.
